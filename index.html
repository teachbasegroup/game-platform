<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachBase Game Library</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 5 1'%3E%3Crect width='1' height='1' fill='%23FF3333'/%3E%3Crect x='1' width='1' height='1' fill='%230066FF'/%3E%3Crect x='2' width='1' height='1' fill='%23FFCC00'/%3E%3Crect x='3' width='1' height='1' fill='%2300AA44'/%3E%3Crect x='4' width='1' height='1' fill='%239944CC'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useContext, createContext } = React;

/* ═══ DESIGN TOKENS — see DESIGN.md. Build every component from these. ═══ */
const COLOR = {
  red: "#FF3333", blue: "#0066FF", yellow: "#FFCC00", green: "#00AA44", purple: "#9944CC",
  ink: "#1a1a1a", body: "#444444", muted: "#888888", faint: "#CCCCCC",
  line: "#E0E0E0", hairline: "#F0F0F0", wash: "#FAFAFA",
};
const FONT = {
  serif: "Georgia, 'Times New Roman', serif",
  mono: "'Courier New', Courier, monospace",
};
/* type scale — no other sizes */
const TYPE = { label: 11, meta: 13, body: 15, h2: 20, h1: 24 };
/* spacing: multiples of 8 only */

const AGE_COLORS = { "6-8": COLOR.red, "9-12": COLOR.blue, "all": COLOR.yellow };

/* ═══ DATABASE — Supabase project config.
   Safe to publish: the anon key only allows what the database rules (RLS)
   permit — reading published content. See supabase/setup.sql. ═══ */
const SUPABASE_URL = "https://akfppsmopgezbfcnwwze.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrZnBwc21vcGdlemJmY253d3plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjk2MjgsImV4cCI6MjA5ODY0NTYyOH0.684zS-3wb8evgOowLtJ7ohh4GdawoVZR_BIqEyoIBUk";

/* Fetch all content and rebuild the nested categories → games → cards shape
   the components render. Bilingual columns (title_en / title_de) become
   { en, de } objects, matching how the content looked when it lived here. */
async function loadContent() {
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const [cats, games, cards] = await Promise.all([
    db.from("categories").select("*").order("sort_order"),
    db.from("games").select("*").order("sort_order"),
    db.from("cards").select("*").order("sort_order"),
  ]);
  const err = cats.error || games.error || cards.error;
  if (err) throw err;

  const bi = (row, f) => (row[f + "_en"] == null ? null : { en: row[f + "_en"], de: row[f + "_de"] });
  return cats.data.map(c => ({
    id: c.id,
    title: bi(c, "title"),
    desc: bi(c, "desc"),
    color: COLOR[c.color] || COLOR.muted,
    games: games.data.filter(g => g.category_id === c.id).map(g => ({
      id: g.id,
      type: g.type,
      title: bi(g, "title"),
      subtitle: bi(g, "subtitle"),
      meta: { size: bi(g, "size"), time: bi(g, "time"), materials: bi(g, "materials") },
      tags: g.tags || [],
      age: g.age,
      setup: bi(g, "setup"),
      how: bi(g, "how"),
      tip: bi(g, "tip"),
      prompts: cards.data.filter(k => k.game_id === g.id).map(k => ({
        text: bi(k, "text"),
        hint: bi(k, "hint"),
        age: k.age,
      })),
    })),
  }));
}

/* ═══ UI STRINGS ═══ */
const UI = {
  libraryTitle: { en: "Game Library", de: "Spielebibliothek" },
  back: { en: "back", de: "zurück" },
  allCategories: { en: "all categories", de: "alle Kategorien" },
  age: { en: "Age", de: "Alter" },
  all: { en: "All", de: "Alle" },
  allAges: { en: "All ages", de: "Alle Altersgruppen" },
  nextCard: { en: "Next card", de: "Nächste Karte" },
  reshuffle: { en: "Reshuffle", de: "Neu mischen" },
  noPrompts: { en: "No cards for this age range yet.", de: "Für diese Altersgruppe gibt es noch keine Karten." },
  noGames: { en: "No games yet.", de: "Noch keine Spiele." },
  empty: { en: "empty", de: "leer" },
  cards: { en: "cards", de: "Karten" },
  activity: { en: "activity", de: "Aktivität" },
  hint: { en: "Hint", de: "Hinweis" },
  tip: { en: "Tip", de: "Tipp" },
  setup: { en: "Setup", de: "Vorbereitung" },
  howToPlay: { en: "How to play", de: "So geht's" },
  loading: { en: "Loading …", de: "Lädt …" },
  loadError: {
    en: "Couldn't load the games. Check your connection and reload the page.",
    de: "Die Spiele konnten nicht geladen werden. Prüf deine Verbindung und lade die Seite neu.",
  },
  retry: { en: "Reload", de: "Neu laden" },
};

const TAGS = {
  "break": { en: "break", de: "Pause" },
  "waiting": { en: "waiting", de: "Wartezeit" },
  "trickle-in": { en: "trickle-in", de: "Ankommen" },
  "cooldown": { en: "cooldown", de: "Abkühlen" },
  "team builder": { en: "team builder", de: "Teambuilding" },
  "get-to-know": { en: "get-to-know", de: "Kennenlernen" },
  "in-class": { en: "in-class", de: "im Unterricht" },
  "energy burn": { en: "energy burn", de: "Energie abbauen" },
  "focus reset": { en: "focus reset", de: "Fokus-Reset" },
  "transition": { en: "transition", de: "Übergang" },
};


/* ═══ LANGUAGE ═══ */
const LangCtx = createContext("de");
function useT() {
  const lang = useContext(LangCtx);
  return {
    lang,
    t: (field) => (field && typeof field === "object" ? field[lang] : field),
    ui: (key) => UI[key][lang],
  };
}
function gamesLabel(n, lang) {
  if (lang === "de") return `${n} Spiel${n !== 1 ? "e" : ""}`;
  return `${n} game${n !== 1 ? "s" : ""}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* small-caps label style used everywhere for metadata */
const label = { fontFamily: FONT.mono, fontSize: TYPE.label, letterSpacing: "0.12em", textTransform: "uppercase", color: COLOR.muted };
const metaStyle = { fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted, letterSpacing: "0.03em" };

function AgeBadge({ age }) {
  const { ui, lang } = useT();
  const text = age === "all" ? ui("allAges") : (lang === "de" ? `${age} Jahre` : `Ages ${age}`);
  return (
    <span style={{
      ...label, padding: "2px 8px", borderRadius: 2,
      background: COLOR.hairline, color: COLOR.body,
      borderLeft: `3px solid ${AGE_COLORS[age] || COLOR.muted}`,
      marginTop: 8, display: "inline-block",
    }}>{text}</span>
  );
}

function Meta({ m }) {
  const { t } = useT();
  return (
    <div style={{ display: "flex", gap: 16, marginBottom: 8, ...metaStyle }}>
      <span>{t(m.size)}</span><span>{t(m.time)}</span><span>{t(m.materials)}</span>
    </div>
  );
}

function Tags({ tags }) {
  const { t } = useT();
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
      {tags.map(key => (
        <span key={key} style={{ ...label, letterSpacing: "0.06em", textTransform: "none", padding: "2px 8px", background: COLOR.wash, color: COLOR.muted, borderRadius: 2 }}>
          {TAGS[key] ? t(TAGS[key]) : key}
        </span>
      ))}
    </div>
  );
}

function NavBack({ onClick, text }) {
  return (
    <button onClick={onClick} style={{ fontFamily: FONT.mono, fontSize: TYPE.label, color: COLOR.muted, cursor: "pointer", background: "none", border: "none", padding: 0, marginBottom: 24, display: "block" }}>
      &larr; {text}
    </button>
  );
}

function Btn({ onClick, children, secondary }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: FONT.serif, fontSize: TYPE.meta,
      background: "#FFF", color: secondary ? COLOR.muted : COLOR.ink,
      border: `2px solid ${secondary ? COLOR.line : COLOR.ink}`,
      padding: "8px 16px", borderRadius: 2, cursor: "pointer", letterSpacing: "0.02em",
      minHeight: 44, /* thumb-sized tap target */
    }}>{children}</button>
  );
}

/* Setup / How to play / Tip — one consistent instruction block for all games */
function Instructions({ game }) {
  const { t, ui } = useT();
  const sections = [
    { key: "setup", text: t(game.setup) },
    { key: "howToPlay", text: t(game.how) },
  ];
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ background: COLOR.wash, border: `1px solid ${COLOR.hairline}`, borderRadius: 4 }}>
        {sections.map((s, i) => s.text && (
          <div key={s.key} style={{ padding: 16, borderTop: i > 0 ? `1px solid ${COLOR.line}` : "none" }}>
            <div style={{ ...label, marginBottom: 8, color: COLOR.blue }}>{ui(s.key)}</div>
            <p style={{ fontFamily: FONT.serif, fontSize: TYPE.body, lineHeight: 1.7, color: COLOR.body }}>{s.text}</p>
          </div>
        ))}
      </div>
      {t(game.tip) && (
        <div style={{ fontFamily: FONT.serif, marginTop: 16, paddingLeft: 16, borderLeft: `3px solid ${COLOR.line}`, fontSize: TYPE.meta, color: COLOR.muted, lineHeight: 1.6 }}>
          <strong style={{ color: COLOR.body }}>{ui("tip")}:</strong> {t(game.tip)}
        </div>
      )}
    </div>
  );
}

/* ─── DECK PLAYER ─── */
function DeckPlayer({ game, onBack }) {
  const { t, ui } = useT();
  const [filter, setFilter] = useState("all");
  const filtered = useMemo(
    () => game.prompts.filter(p => filter === "all" || p.age === filter),
    [filter, game]
  );
  const [deck, setDeck] = useState(() => shuffle(filtered));
  const [idx, setIdx] = useState(0);
  useEffect(() => { setDeck(shuffle(filtered)); setIdx(0); }, [filtered]);

  const card = deck[idx];
  const ages = [...new Set(game.prompts.map(p => p.age))];
  const next = () => setIdx(i => (i + 1) % deck.length);
  const reshuffle = () => { setDeck(shuffle(filtered)); setIdx(0); };

  return (
    <div>
      <NavBack onClick={onBack} text={ui("back")} />
      <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 4 }}>{t(game.title)}</h2>
      {game.subtitle && <p style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted, marginBottom: 16 }}>{t(game.subtitle)}</p>}
      <Meta m={game.meta} />
      <Tags tags={game.tags} />
      <Instructions game={game} />

      <div style={{ display: "flex", gap: 8, margin: "24px 0 16px", alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ ...label, marginRight: 8 }}>{ui("age")}</span>
        {["all", ...ages.filter(a => a !== "all")].map(a => (
          <button key={a} onClick={() => setFilter(a)} style={{
            fontFamily: FONT.serif, fontSize: TYPE.label, padding: "8px 16px",
            border: `2px solid ${filter === a ? (AGE_COLORS[a] || COLOR.muted) : COLOR.line}`,
            borderRadius: 2, cursor: "pointer", minHeight: 40,
            background: filter === a ? COLOR.wash : "#FFF",
            color: filter === a ? COLOR.ink : COLOR.faint,
          }}>
            {a === "all" ? ui("all") : a}
          </button>
        ))}
      </div>

      {deck.length === 0 ? (
        <p style={{ fontFamily: FONT.serif, color: COLOR.faint, fontSize: TYPE.meta, padding: "40px 0", textAlign: "center" }}>{ui("noPrompts")}</p>
      ) : card && (
        <div onClick={next} style={{
          border: `2px solid ${COLOR.line}`, borderLeft: `6px solid ${AGE_COLORS[card.age] || COLOR.muted}`,
          borderRadius: 4, padding: 32,
          /* scales up for laptop + beamer: readable across a room */
          minHeight: "clamp(200px, 32vh, 360px)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          textAlign: "center", marginBottom: 16, cursor: "pointer", userSelect: "none",
        }}>
          <div style={{ fontFamily: FONT.serif, fontSize: "clamp(17px, 2.6vw, 34px)", lineHeight: 1.7, whiteSpace: "pre-line" }}>{t(card.text)}</div>
          {card.hint && <div style={{ fontFamily: FONT.serif, fontSize: "clamp(13px, 1.6vw, 20px)", color: COLOR.muted, marginTop: 16 }}>{ui("hint")}: {t(card.hint)}</div>}
          <AgeBadge age={card.age} />
        </div>
      )}

      {deck.length > 0 && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Btn onClick={next}>{ui("nextCard")}</Btn>
          <span style={{ fontFamily: FONT.mono, fontSize: TYPE.label, color: COLOR.faint }}>{idx + 1} / {deck.length}</span>
          <Btn onClick={reshuffle} secondary>{ui("reshuffle")}</Btn>
        </div>
      )}
    </div>
  );
}

/* ─── ACTIVITY CARD ─── */
function ActivityCard({ game, onBack }) {
  const { t, ui } = useT();
  return (
    <div>
      <NavBack onClick={onBack} text={ui("back")} />
      <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 8 }}>{t(game.title)}</h2>
      <div style={{ marginBottom: 16 }}><AgeBadge age={game.age} /></div>
      <Meta m={game.meta} />
      <Tags tags={game.tags} />
      <Instructions game={game} />
    </div>
  );
}

/* ─── MAIN ─── */
function App() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("tb-lang") || "de"; } catch (e) { return "de"; }
  });
  const [view, setView] = useState("home");
  const [catId, setCatId] = useState(null);
  const [gameId, setGameId] = useState(null);

  /* content: null = loading, [] and up = loaded; loadError switches to the error view */
  const [categories, setCategories] = useState(null);
  const [loadError, setLoadError] = useState(false);
  useEffect(() => {
    loadContent().then(setCategories).catch(e => { console.error(e); setLoadError(true); });
  }, []);

  useEffect(() => {
    try { localStorage.setItem("tb-lang", lang); } catch (e) {}
    document.documentElement.lang = lang;
  }, [lang]);

  const cat = categories && categories.find(c => c.id === catId);
  const game = cat && cat.games.find(g => g.id === gameId);

  const goHome = () => { setView("home"); setCatId(null); setGameId(null); };
  const openCat = (id) => { setCatId(id); setView("category"); setGameId(null); };
  const openGame = (id) => { setGameId(id); setView("game"); };

  const t = (field) => (field && typeof field === "object" ? field[lang] : field);
  const ui = (key) => UI[key][lang];

  return (
    <LangCtx.Provider value={lang}>
    <div style={{ minHeight: "100vh", background: "#FFFFFF", color: COLOR.ink, fontFamily: FONT.serif }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .tile { border: 2px solid ${COLOR.line}; border-radius: 4px; padding: 24px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
        .tile:hover { transform: translateY(-2px); }
        .tile.empty { opacity: 0.3; cursor: default; }
        .tile.empty:hover { transform: none; }
        .lang-btn { font-family: ${FONT.mono}; font-size: ${TYPE.label}px; letter-spacing: 0.1em; background: none; border: none; cursor: pointer; padding: 8px; }
      `}</style>

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "48px 24px 80px" }}>

        <header style={{ marginBottom: 40, borderBottom: `2px solid ${COLOR.ink}`, paddingBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
                {[COLOR.red, COLOR.blue, COLOR.yellow, COLOR.green, COLOR.purple].map((c, i) => (
                  <span key={i} style={{ display: "inline-block", width: 6, height: 6, background: c }} />
                ))}
              </div>
              <span style={{ ...label }}>TeachBase</span>
              <h1 onClick={goHome} style={{ fontFamily: FONT.serif, fontSize: TYPE.h1, fontWeight: 700, cursor: "pointer" }}>{ui("libraryTitle")}</h1>
            </div>
            <div style={{ display: "flex", alignItems: "center" }}>
              {["en", "de"].map((l, i) => (
                <React.Fragment key={l}>
                  {i > 0 && <span style={{ color: COLOR.faint, fontFamily: FONT.mono, fontSize: TYPE.label }}>|</span>}
                  <button className="lang-btn" onClick={() => setLang(l)}
                    style={{ color: lang === l ? COLOR.blue : COLOR.faint, fontWeight: lang === l ? 700 : 400 }}>
                    {l.toUpperCase()}
                  </button>
                </React.Fragment>
              ))}
            </div>
          </div>
        </header>

        {loadError && (
          <div className="fade-in" style={{ padding: "40px 0", textAlign: "center" }}>
            <p style={{ fontFamily: FONT.serif, fontSize: TYPE.body, color: COLOR.body, lineHeight: 1.7, marginBottom: 24 }}>{ui("loadError")}</p>
            <Btn onClick={() => window.location.reload()}>{ui("retry")}</Btn>
          </div>
        )}

        {!loadError && categories === null && (
          <p style={{ fontFamily: FONT.mono, fontSize: TYPE.label, letterSpacing: "0.12em", textTransform: "uppercase", color: COLOR.faint, padding: "40px 0", textAlign: "center" }}>{ui("loading")}</p>
        )}

        {!loadError && categories && view === "home" && (
          <div className="fade-in">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {categories.map(c => {
                const count = c.games.length;
                const isEmpty = count === 0;
                return (
                  <div key={c.id} className={`tile ${isEmpty ? "empty" : ""}`}
                    onClick={() => !isEmpty && openCat(c.id)}
                    style={{ borderTop: `4px solid ${c.color}`, minHeight: 120, display: "flex", flexDirection: "column", justifyContent: "space-between" }}
                    onMouseEnter={e => { if (!isEmpty) e.currentTarget.style.borderColor = c.color; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = COLOR.line; e.currentTarget.style.borderTopColor = c.color; }}
                  >
                    <div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.body, fontWeight: 700, marginBottom: 8 }}>{t(c.title)}</div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted, lineHeight: 1.5 }}>{t(c.desc)}</div>
                    </div>
                    <div style={{ ...label, color: isEmpty ? COLOR.faint : c.color, marginTop: 16 }}>
                      {isEmpty ? ui("empty") : gamesLabel(count, lang)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {view === "category" && cat && (
          <div className="fade-in">
            <NavBack onClick={goHome} text={ui("allCategories")} />
            <div style={{ borderTop: `4px solid ${cat.color}`, paddingTop: 16, marginBottom: 24 }}>
              <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 4 }}>{t(cat.title)}</h2>
              <p style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted }}>{t(cat.desc)}</p>
            </div>
            {cat.games.length === 0 ? (
              <p style={{ fontFamily: FONT.serif, color: COLOR.faint, fontSize: TYPE.meta, padding: "40px 0", textAlign: "center" }}>{ui("noGames")}</p>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                {cat.games.map(g => (
                  <div key={g.id} className="tile" onClick={() => openGame(g.id)}
                    style={{ minHeight: 104, display: "flex", flexDirection: "column", justifyContent: "space-between" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = cat.color; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = COLOR.line; }}
                  >
                    <div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.body, fontWeight: 700, marginBottom: 4 }}>{t(g.title)}</div>
                      {g.subtitle && <div style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted }}>{t(g.subtitle)}</div>}
                    </div>
                    <div style={{ ...metaStyle, fontSize: TYPE.label, marginTop: 8 }}>
                      {g.type === "deck" ? `${g.prompts.length} ${ui("cards")}` : ui("activity")} · {t(g.meta.time)}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {view === "game" && game && (
          <div className="fade-in">
            {game.type === "deck"
              ? <DeckPlayer game={game} onBack={() => openCat(catId)} />
              : <ActivityCard game={game} onBack={() => openCat(catId)} />
            }
          </div>
        )}

        <footer style={{ marginTop: 80, paddingTop: 16, borderTop: `1px solid ${COLOR.hairline}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ ...label, color: COLOR.faint }}>TeachBase — {ui("libraryTitle")}</span>
          <div style={{ display: "flex", gap: 3 }}>
            {[COLOR.red, COLOR.blue, COLOR.yellow, COLOR.green, COLOR.purple].map((c, i) => (
              <span key={i} style={{ display: "inline-block", width: 5, height: 5, background: c }} />
            ))}
          </div>
        </footer>
      </div>
    </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
