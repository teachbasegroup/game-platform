   automatically sends it with every query — so the same code reads published

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Fetch all content and rebuild the nested categories → games → cards shape
   the components render. Bilingual columns (title_en / title_de) become
   { en, de } objects, matching how the content looked when it lived here.
   Each game/card keeps its raw database row in _row — the edit forms need it. */
async function loadContent() {
  const [cats, games, cards] = await Promise.all([
    db.from("categories").select("*").order("sort_order"),
    db.from("games").select("*").order("sort_order"),
    db.from("cards").select("*").order("sort_order"),
  ]);
  const err = cats.error || games.error || cards.error;
  if (err) throw err;

  const bi = (row, f) => (row[f + "_en"] == null ? null : { en: row[f + "_en"], de: row[f + "_de"] });
  return cats.data.map(c => ({
    id: c.id,
    title: bi(c, "title"),
    desc: bi(c, "desc"),
    color: COLOR[c.color] || COLOR.muted,
    games: games.data.filter(g => g.category_id === c.id).map(g => ({
      id: g.id,
      type: g.type,
      status: g.status,
      sort: g.sort_order,
      title: bi(g, "title"),
      subtitle: bi(g, "subtitle"),
      meta: { size: bi(g, "size"), time: bi(g, "time"), materials: bi(g, "materials") },
      tags: g.tags || [],
      age: g.age,
      setup: bi(g, "setup"),
      how: bi(g, "how"),
      tip: bi(g, "tip"),
      _row: g,
      prompts: cards.data.filter(k => k.game_id === g.id).map(k => ({
        dbId: k.id,
        status: k.status,
        sort: k.sort_order,
        text: bi(k, "text"),
        hint: bi(k, "hint"),
        age: k.age,
        _row: k,
      })),
    })),
  }));
}

/* ═══ LANGUAGE ═══ */
const LangCtx = createContext("de");
function useT() {
  const lang = useContext(LangCtx);
  return {
    lang,
    t: (field) => (field && typeof field === "object" ? field[lang] : field),
    ui: (key) => UI[key][lang],
  };
}
function gamesLabel(n, lang) {
  if (lang === "de") return `${n} Spiel${n !== 1 ? "e" : ""}`;
  return `${n} game${n !== 1 ? "s" : ""}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ═══ EDIT MODE — team login + content editing. Writes go through the same
   client; the database rules only allow them with a signed-in session. ═══ */

function slugify(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/ß/g, "ss").replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "game";
}
function uniqueSlug(base, taken) {
  let s = base, n = 2;
  while (taken.includes(s)) s = `${base}-${n++}`;
  return s;
}

const inputStyle = {
  fontFamily: FONT.serif, fontSize: TYPE.body, color: COLOR.ink,
  border: `2px solid ${COLOR.line}`, borderRadius: 2, padding: 8,
  width: "100%", background: "#FFF",
};

function Field({ lab, children }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ ...label, marginBottom: 8 }}>{lab}</div>
      {children}
    </div>
  );
}

/* one labeled field, two languages side by side */
function BiField({ lab, value, onChange, rows }) {
  const inp = (l) => rows
    ? <textarea rows={rows} value={value[l] || ""} onChange={e => onChange({ ...value, [l]: e.target.value })} style={{ ...inputStyle, resize: "vertical" }} />
    : <input value={value[l] || ""} onChange={e => onChange({ ...value, [l]: e.target.value })} style={inputStyle} />;
  return (
    <Field lab={lab}>
      <div className="bi-grid">
        {["en", "de"].map(l => (
          <div key={l}>
            <div style={{ ...label, color: COLOR.faint, marginBottom: 4 }}>{l.toUpperCase()}</div>
            {inp(l)}
          </div>
        ))}
      </div>
    </Field>
  );
}

function ToggleRow({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {options.map(o => (
        <button key={o.value} type="button" onClick={() => onChange(o.value)} style={{
          fontFamily: FONT.serif, fontSize: TYPE.label, padding: "8px 16px",
          border: `2px solid ${value === o.value ? COLOR.ink : COLOR.line}`,
          borderRadius: 2, cursor: "pointer", minHeight: 40,
          background: value === o.value ? COLOR.wash : "#FFF",
          color: value === o.value ? COLOR.ink : COLOR.faint,
        }}>{o.text}</button>
      ))}
    </div>
  );
}

function DraftBadge() {

  return (

}

function FormError({ children }) {
  return children ? <p style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.red, marginBottom: 16 }}>{children}</p> : null;
}

function LoginView({ onBack, onSuccess }) {
  const { ui } = useT();
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(false);
    const { error } = await db.auth.signInWithPassword({ email, password: pw });
    setBusy(false);
    if (error) setErr(true); else onSuccess();
  };
  return (
    <div>
      <NavBack onClick={onBack} text={ui("back")} />
      <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 24 }}>{ui("editMode")}</h2>
      <form onSubmit={submit} style={{ maxWidth: 360 }}>
        <Field lab={ui("email")}>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} style={inputStyle} autoComplete="email" required />
        </Field>
        <Field lab={ui("password")}>
          <input type="password" value={pw} onChange={e => setPw(e.target.value)} style={inputStyle} autoComplete="current-password" required />
        </Field>
        <FormError>{err && ui("loginFailed")}</FormError>
        <Btn type="submit">{busy ? "…" : ui("signIn")}</Btn>
      </form>
    </div>
  );
}

/* add or edit one game; mode: "new" (needs categoryId) | "edit" (needs game) */
function GameForm({ mode, game, categoryId, categories, onDone, onCancel }) {
  const { t, ui } = useT();
  const row = (game && game._row) || {};
  const [f, setF] = useState({
    title: { en: row.title_en || "", de: row.title_de || "" },
    subtitle: { en: row.subtitle_en || "", de: row.subtitle_de || "" },
    size: { en: row.size_en || "", de: row.size_de || "" },
    time: { en: row.time_en || "", de: row.time_de || "" },
    materials: { en: row.materials_en || "", de: row.materials_de || "" },
    setup: { en: row.setup_en || "", de: row.setup_de || "" },
    how: { en: row.how_en || "", de: row.how_de || "" },
    tip: { en: row.tip_en || "", de: row.tip_de || "" },
    type: row.type || "activity",
    age: row.age || "all",
    tags: row.tags || [],
    status: row.status || "draft",
    category_id: row.category_id || categoryId,
  });
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);
  const set = (k) => (v) => setF(s => ({ ...s, [k]: v }));
  const toggleTag = (tag) => setF(s => ({ ...s, tags: s.tags.includes(tag) ? s.tags.filter(x => x !== tag) : [...s.tags, tag] }));

  const submit = async (e) => {
    e.preventDefault();
    if (!f.title.en.trim() || !f.title.de.trim()) { setErr(ui("titleRequired")); return; }
    setBusy(true); setErr(null);
    const nn = (s) => (s && s.trim() ? s.trim() : null);
    const data = {
      title_en: f.title.en.trim(), title_de: f.title.de.trim(),
      subtitle_en: nn(f.subtitle.en), subtitle_de: nn(f.subtitle.de),
      size_en: nn(f.size.en), size_de: nn(f.size.de),
      time_en: nn(f.time.en), time_de: nn(f.time.de),
      materials_en: nn(f.materials.en), materials_de: nn(f.materials.de),
      setup_en: nn(f.setup.en), setup_de: nn(f.setup.de),
      how_en: nn(f.how.en), how_de: nn(f.how.de),
      tip_en: nn(f.tip.en), tip_de: nn(f.tip.de),
      type: f.type, age: f.type === "activity" ? f.age : null,
      tags: f.tags, status: f.status,
      category_id: f.category_id,
    };
    let error;
    if (mode === "new") {
      const cat = categories.find(c => c.id === f.category_id);
      data.id = uniqueSlug(slugify(f.title.en || f.title.de), categories.flatMap(c => c.games.map(g => g.id)));
      data.sort_order = Math.max(0, ...cat.games.map(g => g.sort || 0)) + 1;
      ({ error } = await db.from("games").insert(data));
    } else {
      ({ error } = await db.from("games").update(data).eq("id", game.id));
    }
    setBusy(false);
    if (error) { console.error(error); setErr(ui("saveError")); return; }
    onDone(mode === "new" ? data.id : game.id);
  };

  const removeGame = async () => {
    if (!window.confirm(ui("confirmDeleteGame"))) return;
    setBusy(true);
    const cardsRes = await db.from("cards").delete().eq("game_id", game.id);
    const gameRes = cardsRes.error ? cardsRes : await db.from("games").delete().eq("id", game.id);
    setBusy(false);
    if (gameRes.error) { console.error(gameRes.error); setErr(ui("saveError")); return; }
    onDone(null);
  };

  return (
    <div>
      <NavBack onClick={onCancel} text={ui("cancel")} />
      <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 24 }}>
        {mode === "new" ? ui("newGame") : `${ui("editGame")}: ${t(game.title)}`}
      </h2>
      <form onSubmit={submit}>
        <BiField lab={ui("title")} value={f.title} onChange={set("title")} />
        <BiField lab={ui("subtitle")} value={f.subtitle} onChange={set("subtitle")} />
        <Field lab={ui("categoryLabel")}>
          <ToggleRow value={f.category_id} onChange={set("category_id")}
            options={categories.map(c => ({ value: c.id, text: t(c.title) }))} />
        </Field>
        <Field lab={ui("typeLabel")}>
          <ToggleRow value={f.type} onChange={set("type")} options={[
            { value: "activity", text: ui("typeActivity") },
            { value: "deck", text: ui("typeDeck") },
          ]} />
        </Field>
        <BiField lab={ui("groupSize")} value={f.size} onChange={set("size")} />
        <BiField lab={ui("duration")} value={f.time} onChange={set("time")} />
        <BiField lab={ui("materials")} value={f.materials} onChange={set("materials")} />
        {f.type === "activity" && (
          <Field lab={ui("age")}>
            <ToggleRow value={f.age} onChange={set("age")} options={
              [...AGES, "all"].map(a => ({ value: a, text: a === "all" ? ui("allAges") : a }))
            } />
          </Field>
        )}
        <Field lab={ui("tagsLabel")}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {Object.keys(TAGS).map(tag => (
              <button key={tag} type="button" onClick={() => toggleTag(tag)} style={{
                fontFamily: FONT.serif, fontSize: TYPE.label, padding: "8px 12px",
                border: `2px solid ${f.tags.includes(tag) ? COLOR.ink : COLOR.line}`,
                borderRadius: 2, cursor: "pointer", minHeight: 40,
                background: f.tags.includes(tag) ? COLOR.wash : "#FFF",
                color: f.tags.includes(tag) ? COLOR.ink : COLOR.faint,
              }}>{t(TAGS[tag])}</button>
            ))}
          </div>
        </Field>
        <BiField lab={ui("setup")} value={f.setup} onChange={set("setup")} rows={3} />
        <BiField lab={ui("howToPlay")} value={f.how} onChange={set("how")} rows={4} />
        <BiField lab={ui("tip")} value={f.tip} onChange={set("tip")} rows={3} />
        <Field lab={ui("statusLabel")}>
          <ToggleRow value={f.status} onChange={set("status")} options={[
            { value: "draft", text: ui("draft") },
            { value: "published", text: ui("published") },
          ]} />
        </Field>
        <FormError>{err}</FormError>
        <div style={{ display: "flex", gap: 8, marginTop: 24 }}>
          <Btn type="submit">{busy ? "…" : ui("save")}</Btn>
          <Btn onClick={onCancel} secondary>{ui("cancel")}</Btn>
        </div>
      </form>
      {mode === "edit" && (
        <button type="button" onClick={removeGame} style={{
          fontFamily: FONT.mono, fontSize: TYPE.label, letterSpacing: "0.08em",
          color: COLOR.red, background: "none", border: "none", cursor: "pointer",
          padding: 0, marginTop: 40, display: "block",
        }}>{ui("deleteGame")}</button>
      )}
    </div>
  );
}

/* add or edit one card of a deck game */
function CardForm({ card, game, onDone, onCancel }) {
  const { ui } = useT();
  const row = (card && card._row) || {};
  const [f, setF] = useState({
    text: { en: row.text_en || "", de: row.text_de || "" },
    hint: { en: row.hint_en || "", de: row.hint_de || "" },
    age: row.age || "all",
    status: row.status || "draft",
  });
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);
  const set = (k) => (v) => setF(s => ({ ...s, [k]: v }));

  const submit = async (e) => {
    e.preventDefault();
    if (!f.text.en.trim() || !f.text.de.trim()) { setErr(ui("textRequired")); return; }
    setBusy(true); setErr(null);
    const nn = (s) => (s && s.trim() ? s.trim() : null);
    const data = {
      text_en: f.text.en.trim(), text_de: f.text.de.trim(),
      hint_en: nn(f.hint.en), hint_de: nn(f.hint.de),
      age: f.age, status: f.status,
    };
    let error;
    if (card) {
      ({ error } = await db.from("cards").update(data).eq("id", card.dbId));
    } else {
      data.game_id = game.id;
      data.sort_order = Math.max(0, ...game.prompts.map(p => p.sort || 0)) + 1;
      ({ error } = await db.from("cards").insert(data));
    }
    setBusy(false);
    if (error) { console.error(error); setErr(ui("saveError")); return; }
    onDone();
  };

  return (
    <form onSubmit={submit} style={{ border: `2px solid ${COLOR.line}`, borderRadius: 4, padding: 16, marginBottom: 16 }}>
      <div style={{ ...label, marginBottom: 16, color: COLOR.blue }}>{card ? ui("editCard") : ui("newCard")}</div>
      <BiField lab={ui("cardText")} value={f.text} onChange={set("text")} rows={4} />
      <BiField lab={ui("hintOptional")} value={f.hint} onChange={set("hint")} rows={2} />
      <Field lab={ui("age")}>
        <ToggleRow value={f.age} onChange={set("age")} options={
          [...AGES, "all"].map(a => ({ value: a, text: a === "all" ? ui("allAges") : a }))
        } />
      </Field>
      <Field lab={ui("statusLabel")}>
        <ToggleRow value={f.status} onChange={set("status")} options={[
          { value: "draft", text: ui("draft") },
          { value: "published", text: ui("published") },
        ]} />
      </Field>
      <FormError>{err}</FormError>
      <div style={{ display: "flex", gap: 8 }}>
        <Btn type="submit">{busy ? "…" : ui("save")}</Btn>
        <Btn onClick={onCancel} secondary>{ui("cancel")}</Btn>
      </div>
    </form>
  );
}

/* the card list of a deck game, with add / edit / delete / publish */
function CardManager({ game, onChanged }) {
  const { t, ui } = useT();
  const [editing, setEditing] = useState(null); // null | "new" | a prompt object

  const del = async (p) => {
    if (!window.confirm(ui("confirmDeleteCard"))) return;
    const { error } = await db.from("cards").delete().eq("id", p.dbId);
    if (!error) onChanged();
  };
  const flip = async (p) => {
    const { error } = await db.from("cards")
      .update({ status: p.status === "published" ? "draft" : "published" }).eq("id", p.dbId);
    if (!error) onChanged();
  };
  const doneEditing = () => { setEditing(null); onChanged(); };

  return (
    <div style={{ marginTop: 24 }}>
      <div style={{ ...label, marginBottom: 16 }}>{ui("cards")} ({game.prompts.length})</div>
      {editing && (
        <CardForm card={editing === "new" ? null : editing} game={game} onDone={doneEditing} onCancel={() => setEditing(null)} />
      )}
      <div style={{ border: `1px solid ${COLOR.line}`, borderRadius: 4, marginBottom: 16 }}>
        {game.prompts.length === 0 && (
          <p style={{ fontFamily: FONT.serif, color: COLOR.faint, fontSize: TYPE.meta, padding: 24, textAlign: "center" }}>{ui("noPrompts")}</p>
        )}
        {game.prompts.map((p, i) => (
          <div key={p.dbId} style={{
            display: "flex", alignItems: "center", gap: 12, padding: "12px 16px",
            borderTop: i > 0 ? `1px solid ${COLOR.hairline}` : "none",
            borderLeft: `4px solid ${AGE_COLORS[p.age] || COLOR.muted}`,
            opacity: p.status === "draft" ? 0.65 : 1,
          }}>
            <span style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.body, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {(t(p.text) || "").split("\n")[0]}
            </span>
            <button type="button" onClick={() => flip(p)} title={ui("statusLabel")} style={{
              ...label, cursor: "pointer", background: "none", border: `1px ${p.status === "draft" ? "dashed" : "solid"} ${p.status === "draft" ? COLOR.muted : COLOR.green}`,
              color: p.status === "draft" ? COLOR.muted : COLOR.green, padding: "2px 8px", borderRadius: 2, flexShrink: 0,
            }}>{ui(p.status)}</button>
            <button type="button" onClick={() => setEditing(p)} className="row-action">{ui("edit")}</button>
            <button type="button" onClick={() => del(p)} className="row-action" style={{ color: COLOR.red }}>{ui("deleteCard")}</button>
          </div>
        ))}
      </div>
      {!editing && <Btn onClick={() => setEditing("new")}>+ {ui("newCard")}</Btn>}
    </div>
  );
}

/* what the game view becomes in edit mode */

/* ─── DECK PLAYER ─── */
function DeckPlayer({ game, onBack }) {
  const { t, ui } = useT();
  const [filter, setFilter] = useState("all");
  const filtered = useMemo(
    () => game.prompts.filter(p => filter === "all" || p.age === filter),
    [filter, game]
  );
  const [deck, setDeck] = useState(() => shuffle(filtered));
  const [idx, setIdx] = useState(0);
  useEffect(() => { setDeck(shuffle(filtered)); setIdx(0); }, [filtered]);

  const card = deck[idx];
  const ages = [...new Set(game.prompts.map(p => p.age))];
  const next = () => setIdx(i => (i + 1) % deck.length);
  const reshuffle = () => { setDeck(shuffle(filtered)); setIdx(0); };

  return (
    <div>
      <NavBack onClick={onBack} text={ui("back")} />
      <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 4 }}>{t(game.title)}</h2>
      {game.subtitle && <p style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted, marginBottom: 16 }}>{t(game.subtitle)}</p>}
      <Meta m={game.meta} />
      <Tags tags={game.tags} />
      <Instructions game={game} />

      <div style={{ display: "flex", gap: 8, margin: "24px 0 16px", alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ ...label, marginRight: 8 }}>{ui("age")}</span>
        {["all", ...ages.filter(a => a !== "all")].map(a => (
          <button key={a} onClick={() => setFilter(a)} style={{
            fontFamily: FONT.serif, fontSize: TYPE.label, padding: "8px 16px",
            border: `2px solid ${filter === a ? (AGE_COLORS[a] || COLOR.muted) : COLOR.line}`,
            borderRadius: 2, cursor: "pointer", minHeight: 40,
            background: filter === a ? COLOR.wash : "#FFF",
            color: filter === a ? COLOR.ink : COLOR.faint,
          }}>
            {a === "all" ? ui("all") : a}
          </button>
        ))}
      </div>

      {deck.length === 0 ? (
        <p style={{ fontFamily: FONT.serif, color: COLOR.faint, fontSize: TYPE.meta, padding: "40px 0", textAlign: "center" }}>{ui("noPrompts")}</p>
      ) : card && (
        <div onClick={next} style={{
          border: `2px solid ${COLOR.line}`, borderLeft: `6px solid ${AGE_COLORS[card.age] || COLOR.muted}`,
          borderRadius: 4, padding: 32,
          /* scales up for laptop + beamer: readable across a room */
          minHeight: "clamp(200px, 32vh, 360px)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          textAlign: "center", marginBottom: 16, cursor: "pointer", userSelect: "none",
        }}>
          <div style={{ fontFamily: FONT.serif, fontSize: "clamp(17px, 2.6vw, 34px)", lineHeight: 1.7, whiteSpace: "pre-line" }}>{t(card.text)}</div>
          {card.hint && <div style={{ fontFamily: FONT.serif, fontSize: "clamp(13px, 1.6vw, 20px)", color: COLOR.muted, marginTop: 16 }}>{ui("hint")}: {t(card.hint)}</div>}
          <AgeBadge age={card.age} />
        </div>
      )}

      {deck.length > 0 && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Btn onClick={next}>{ui("nextCard")}</Btn>
          <span style={{ fontFamily: FONT.mono, fontSize: TYPE.label, color: COLOR.faint }}>{idx + 1} / {deck.length}</span>
          <Btn onClick={reshuffle} secondary>{ui("reshuffle")}</Btn>
        </div>
      )}
    </div>
  );
}

/* ─── MAIN ─── */
function App() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("tb-lang") || "de"; } catch (e) { return "de"; }
  });
  const [view, setView] = useState("home");
  const [catId, setCatId] = useState(null);
  const [gameId, setGameId] = useState(null);

  /* content: null = loading, [] and up = loaded; loadError switches to the error view */
  const [categories, setCategories] = useState(null);
  const [loadError, setLoadError] = useState(false);

  /* team login: session != null after sign-in; editMode is entered on purpose */
  const [session, setSession] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [gameForm, setGameForm] = useState(null); // { mode: "new", catId } | { mode: "edit", game }

  useEffect(() => {
    db.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = db.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const refresh = () => loadContent()
    .then(data => { setCategories(data); return data; })
    .catch(e => { console.error(e); setLoadError(true); });

  /* load on start; reload when the login state changes (drafts appear/disappear) */
  useEffect(() => { refresh(); }, [session ? session.user.id : null]);

  useEffect(() => {
    try { localStorage.setItem("tb-lang", lang); } catch (e) {}
    document.documentElement.lang = lang;
  }, [lang]);

  const cat = categories && categories.find(c => c.id === catId);
  const game = cat && cat.games.find(g => g.id === gameId);

  const goHome = () => { setView("home"); setCatId(null); setGameId(null); setGameForm(null); };
  const openCat = (id) => { setCatId(id); setView("category"); setGameId(null); setGameForm(null); };
  const openGame = (id) => { setGameId(id); setView("game"); };

  /* if the open game/category vanished after a reload (e.g. sign-out hid a draft), step back */
  useEffect(() => {
    if (!categories || view === "gameform") return;
    if (catId && !categories.find(c => c.id === catId)) goHome();
    else if (gameId && cat && !cat.games.find(g => g.id === gameId)) { setView("category"); setGameId(null); }
  }, [categories]);

  const signOut = async () => {
    await db.auth.signOut();
    setEditMode(false);
    goHome();
  };

  const t = (field) => (field && typeof field === "object" ? field[lang] : field);
  const ui = (key) => UI[key][lang];

  return (
    <LangCtx.Provider value={lang}>
    <div style={{ minHeight: "100vh", background: "#FFFFFF", color: COLOR.ink, fontFamily: FONT.serif }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .tile { border: 2px solid ${COLOR.line}; border-radius: 4px; padding: 24px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
        .tile:hover { transform: translateY(-2px); }
        .tile.empty { opacity: 0.3; cursor: default; }
        .tile.empty:hover { transform: none; }
        .lang-btn { font-family: ${FONT.mono}; font-size: ${TYPE.label}px; letter-spacing: 0.1em; background: none; border: none; cursor: pointer; padding: 8px; }
        .bi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 540px) { .bi-grid { grid-template-columns: 1fr; } }
        input:focus, textarea:focus, button:focus-visible { outline: 2px solid ${COLOR.blue}; outline-offset: 1px; }
        .row-action { font-family: ${FONT.mono}; font-size: ${TYPE.label}px; letter-spacing: 0.08em; color: ${COLOR.muted}; background: none; border: none; cursor: pointer; padding: 8px 0; flex-shrink: 0; }
      `}</style>

      {editMode && (
        <div style={{ background: COLOR.ink, padding: "8px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 10 }}>
          <span style={{ ...label, color: "#FFF" }}>{ui("editMode")}</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="lang-btn" style={{ color: "#FFF", fontWeight: 700 }} onClick={() => { setEditMode(false); setGameForm(null); if (view === "gameform" || view === "login") goHome(); }}>{ui("done")}</button>
            <button className="lang-btn" style={{ color: COLOR.faint }} onClick={signOut}>{ui("signOut")}</button>
          </div>
        </div>
      )}

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "48px 24px 80px" }}>

        <header style={{ marginBottom: 40, borderBottom: `2px solid ${COLOR.ink}`, paddingBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
                {[COLOR.red, COLOR.blue, COLOR.yellow, COLOR.green, COLOR.purple].map((c, i) => (
                  <span key={i} style={{ display: "inline-block", width: 6, height: 6, background: c }} />
                ))}
              </div>
              <span style={{ ...label }}>Cellform</span>
              <h1 onClick={goHome} style={{ fontFamily: FONT.serif, fontSize: TYPE.h1, fontWeight: 700, cursor: "pointer" }}>{ui("libraryTitle")}</h1>
            </div>
            <div style={{ display: "flex", alignItems: "center" }}>
              {["en", "de"].map((l, i) => (
                <React.Fragment key={l}>
                  {i > 0 && <span style={{ color: COLOR.faint, fontFamily: FONT.mono, fontSize: TYPE.label }}>|</span>}
                  <button className="lang-btn" onClick={() => setLang(l)}
                    style={{ color: lang === l ? COLOR.blue : COLOR.faint, fontWeight: lang === l ? 700 : 400 }}>
                    {l.toUpperCase()}
                  </button>
                </React.Fragment>
              ))}
            </div>
          </div>
        </header>

        {loadError && (
          <div className="fade-in" style={{ padding: "40px 0", textAlign: "center" }}>
            <p style={{ fontFamily: FONT.serif, fontSize: TYPE.body, color: COLOR.body, lineHeight: 1.7, marginBottom: 24 }}>{ui("loadError")}</p>
            <Btn onClick={() => window.location.reload()}>{ui("retry")}</Btn>
          </div>
        )}

        {!loadError && categories === null && (
          <p style={{ fontFamily: FONT.mono, fontSize: TYPE.label, letterSpacing: "0.12em", textTransform: "uppercase", color: COLOR.faint, padding: "40px 0", textAlign: "center" }}>{ui("loading")}</p>
        )}

        {!loadError && categories && view === "home" && (
          <div className="fade-in">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {categories.map(c => {
                const count = c.games.length;
                const isEmpty = count === 0 && !editMode;
                return (
                  <div key={c.id} className={`tile ${isEmpty ? "empty" : ""}`}
                    onClick={() => !isEmpty && openCat(c.id)}
                    style={{ borderTop: `4px solid ${c.color}`, minHeight: 120, display: "flex", flexDirection: "column", justifyContent: "space-between" }}
                    onMouseEnter={e => { if (!isEmpty) e.currentTarget.style.borderColor = c.color; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = COLOR.line; e.currentTarget.style.borderTopColor = c.color; }}
                  >
                    <div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.body, fontWeight: 700, marginBottom: 8 }}>{t(c.title)}</div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted, lineHeight: 1.5 }}>{t(c.desc)}</div>
                    </div>
                    <div style={{ ...label, color: isEmpty ? COLOR.faint : c.color, marginTop: 16 }}>
                      {isEmpty ? ui("empty") : gamesLabel(count, lang)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {view === "category" && cat && (
          <div className="fade-in">
            <NavBack onClick={goHome} text={ui("allCategories")} />
            <div style={{ borderTop: `4px solid ${cat.color}`, paddingTop: 16, marginBottom: 24 }}>
              <h2 style={{ fontFamily: FONT.serif, fontSize: TYPE.h2, fontWeight: 700, marginBottom: 4 }}>{t(cat.title)}</h2>
              <p style={{ fontFamily: FONT.serif, fontSize: TYPE.meta, color: COLOR.muted }}>{t(cat.desc)}</p>
            </div>
            {cat.games.length === 0 && !editMode ? (
              <p style={{ fontFamily: FONT.serif, color: COLOR.faint, fontSize: TYPE.meta, padding: "40px 0", textAlign: "center" }}>{ui("noGames")}</p>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                {cat.games.map(g => (
                  <div key={g.id} className="tile" onClick={() => openGame(g.id)}

                    onMouseEnter={e => { e.currentTarget.style.borderColor = cat.color; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = COLOR.line; }}
                  >
                    <div>
                      <div style={{ fontFamily: FONT.serif, fontSize: TYPE.body, fontWeight: 700, marginBottom: 4 }}>{t(g.title)}</div>

          <div className="fade-in">
            {editMode
              ? <EditGameView game={game} onBack={() => openCat(catId)} onChanged={refresh}

                ? <DeckPlayer game={game} onBack={() => openCat(catId)} />

            }

          <div className="fade-in">
            <GameForm mode={gameForm.mode} game={gameForm.game} categoryId={gameForm.catId} categories={categories}
              onCancel={() => { setGameForm(null); gameForm.mode === "new" ? openCat(gameForm.catId) : openGame(gameForm.game.id); }}
              onDone={(id) => {
                refresh().then((data) => {
                  setGameForm(null);
                  const home = id && data && data.find(c => c.games.some(g => g.id === id));
                  if (home) { setCatId(home.id); setGameId(id); setView("game"); }
                  else { setView("category"); setGameId(null); }
                });
              }} />
          </div>
        )}

        {view === "login" && (
          <div className="fade-in">
            <LoginView onBack={goHome} onSuccess={() => { setEditMode(true); goHome(); }} />
          </div>
        )}

        <footer style={{ marginTop: 80, paddingTop: 16, borderTop: `1px solid ${COLOR.hairline}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ ...label, color: COLOR.faint }}>
            Cellform — {ui("libraryTitle")}
            <span style={{ margin: "0 8px", color: COLOR.hairline }}>·</span>
            <button className="lang-btn" style={{ color: COLOR.faint, padding: 0, textTransform: "lowercase", letterSpacing: "0.12em" }}
              onClick={() => { if (session) { setEditMode(true); } else { setView("login"); } }}>
              {ui("edit")}
            </button>
          </span>
          <div style={{ display: "flex", gap: 3 }}>
            {[COLOR.red, COLOR.blue, COLOR.yellow, COLOR.green, COLOR.purple].map((c, i) => (
              <span key={i} style={{ display: "inline-block", width: 5, height: 5, background: c }} />
            ))}
          </div>
        </footer>
      </div>
    </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
